<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>어케가지 · 여행 길찾기 플래너</title>
  <meta name="description" content="어케가지 — 날짜별 목적지를 입력하면 동선 최적화 · 실시간 날씨 · 우천 시 실내 추천 · 휴무/예약 체크 · 구글맵 길찾기까지 한 번에. 일정 공유도." />

  <!-- 외부 연결 사전 힌트 (구글맵 + 날씨/폴백 지오코딩) -->
  <link rel="preconnect" href="https://maps.googleapis.com" />
  <link rel="preconnect" href="https://api.open-meteo.com" />
  <link rel="preconnect" href="https://nominatim.openstreetmap.org" />
  <link rel="preconnect" href="https://open.er-api.com" />

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <!-- 상단 앱바 -->
    <header class="appbar">
      <button class="appbar__back" id="navBack" hidden aria-label="뒤로">←</button>
      <button class="appbar__title" id="appTitle" title="홈으로">어케가지</button>
      <div class="appbar__actions">
        <button class="iconbtn iconbtn--accent" id="btnShare" title="일정 공유">↗ 공유</button>
        <button class="iconbtn" id="btnSample" title="예시(오사카 3일) 불러오기">예시</button>
        <button class="iconbtn" id="btnMenu" title="더보기" aria-haspopup="true" aria-expanded="false">⋯</button>
      </div>
    </header>

    <!-- 화면이 여기에 렌더됨 -->
    <main id="view" class="view"></main>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 모달 컨테이너 -->
  <div id="modalRoot"></div>

  <!-- 파일 입력 (가져오기) -->
  <input type="file" id="fileInput" accept="application/json,.json" hidden />

  <!-- App (빌드 단계 없음: 순수 ES5 호환 스크립트, 네임스페이스 TP) -->
  <!-- 설정(구글 키) → 구글맵 로더는 가장 먼저 (geo/maps가 런타임에 참조) -->
  <script src="./js/config.js"></script>
  <script src="./js/gmaps.js"></script>
  <script src="./js/util.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/geo.js"></script>
  <script src="./js/weather.js"></script>
  <script src="./js/maps.js"></script>
  <script src="./js/money.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/editor.js"></script>
  <script src="./js/share.js"></script>
  <script src="./js/sample.js"></script>
  <script src="./js/app.js"></script>

  <!-- 서비스 워커: network-first(온라인이면 새로고침 = 최신, 오프라인이면 캐시 폴백) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
